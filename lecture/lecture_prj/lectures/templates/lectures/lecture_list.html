<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h2>강의 목록</h2>

        {% for lecture in lectures %}
        <p>-{{lecture.code}} {{lecture.title}} - {{lecture.professor.name}}</p>
        수강생 목록: <br />
            {% for st in lecture.students.all %}
            <p>{{st.code}} - {{st.name}}</p>
            {% endfor %}
        <hr />
        {% empty %}
        <p>등록된 강의가 없습니다.</p>
        {% endfor %}
    </body>
</html>
